services:
  mongo:
    image: mongo:8.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      mqtt:
        condition: service_started
    env_file:
      - .env
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: ${MONGODB_DB:-use_plant}
      MQTT_BROKER_URL: mqtt://mqtt:1883
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_ENDPOINT: ${MQTT_ENDPOINT:-ws://localhost:9001}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "4000:4000"
      - "9400:9400"

volumes:
  mongo-data:
  mosquitto-data:
  mosquitto-log:
