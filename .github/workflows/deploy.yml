name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Prepare deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 72.56.240.75 >> ~/.ssh/known_hosts

      - name: Trigger server deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o PreferredAuthentications=publickey root@72.56.240.75

      - name: Verify API health
        run: |
          curl --fail --silent --show-error http://72.56.240.75:4000/auth/validate >/dev/null
