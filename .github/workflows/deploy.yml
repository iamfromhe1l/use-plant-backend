name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Prepare deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 72.56.240.75 >> ~/.ssh/known_hosts

      - name: Trigger server deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o PreferredAuthentications=publickey root@72.56.240.75

      - name: Verify API health
        run: |
          for _ in $(seq 1 30); do
            status="$(curl --silent --output /dev/null --write-out '%{http_code}' http://72.56.240.75:4000/auth/validate || true)"
            if [ "$status" = "200" ]; then
              exit 0
            fi
            echo "health check returned HTTP $status, retrying..."
            sleep 2
          done
          echo "API health check did not succeed in time" >&2
          exit 1
